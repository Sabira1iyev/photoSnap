<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="pricing.css">
  <title>Frontend Mentor | Photosnap Website Challenge</title>
</head>

<body>

  <header class="header-container">
    <img src="assets/stories/mobile/Group.png" alt="" />
    <img class="menu-btn" src="assets/shared/mobile/menu.svg" alt="" />
    <img class="close" src="assets/shared/mobile/close.svg" alt="" />
    <div class="menu-sections">
      <div class="links">
        <a href="#">STORIES</a>
        <a href="">FEATURES</a>
        <a href="">PRICING</a>
      </div>
      <button class="get-invite">GET AN INVITE</button>
    </div>
  </header>


  <section class="pricing-section">
    <div class="group-4">
      <div class="bitmap-image">
        <img src="assets/pricing/mobile/hero.jpg" alt="" />
      </div>
      <div class="group-content" id="four">
        <h2 class="content" id="four-content">PRICING</h2>
        <p class="platf-content">
          Create a your stories, Photosnap is a platform for photographers and visual storytellers. It’s the simple way
          to create and share your photos.
        </p>
      </div>
    </div>


    <div class="product-container">
      <div class="close-open">
        <p class="monthly">Monthly</p>
        <img src="assets/pricing/mobile/Group 11.png" alt="">
        <p class="yearly">Yearly</p>


        



      </div>
    </div>

  </section>



  <script src="script.js"></script>
</body>

</html>
